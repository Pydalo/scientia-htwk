<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTWK Leipzig | Scientia</title>
    <script src="main.js" defer></script>
    <script src="animation.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/faviconv2.png">
</head>
<body>
    <div id="background"></div>
    <canvas id="flower"></canvas>
    <div id="filter-layer"></div>
    <main>
        <div id="chat">
            <div id="messages">
                <h1 id="welcome-text">Hallo, ich bin Scientia.</h1>
                <div id="prompt-input">
                    <textarea id="prompt" placeholder="Stellen sie hier Fragen zu HTWK Leipzig..."></textarea>
                    <button id="send-button" title="Nachricht senden">➜</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
